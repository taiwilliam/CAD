<section class="space-y-3">
  <div class="relative overflow-hidden">
    @if (isLoading) {
      <div
        class="absolute inset-0 z-10 flex items-center justify-center bg-white/80 text-sm text-slate-500"
      >
        Loading DXF preview...
      </div>
    }

    @if (errorMessage) {
      <div
        class="absolute inset-0 z-10 flex items-center justify-center bg-white/90 px-6 text-center text-sm text-rose-600"
      >
        {{ errorMessage }}
      </div>
    }

    @if (showResetButton) {
      <button
        mat-fab
        type="button"
        class="!absolute bottom-4 right-4 z-20 !h-11 !w-11 !min-h-0 !bg-white !text-slate-700 shadow-lg ring-1 ring-slate-200"
        aria-label="Reset DXF view"
        (click)="resetView()"
      >
        <mat-icon>center_focus_strong</mat-icon>
      </button>
    }

    <div
      #viewerHost
      class="w-full bg-white"
      [style.height.px]="viewerHeight"
    ></div>
  </div>
</section>
